name: Build Armbian Image For Minisforum MS-R1
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest # ubuntu-24.04-arm, ubuntu-latest, ubuntu-24.04-riscv
    
    permissions:
      contents: write
      actions: write
      checks: write
      
    steps:
      - uses: armbian/build@v26.2.1 # main
        with:
          armbian_token: ${{ secrets.GITHUB_TOKEN }}
          armbian_board:  "uefi-arm64" # "minisforum-msr1" orangepi5 bananapif3
          armbian_release: "trixie" # forky
          armbian_target: "build"
          armbian_ui: "xfce" # "kde-plasma" # server xfce gnome
          armbian_runner_clean: "yes"
          armbian_kernel_branch: "edge"
